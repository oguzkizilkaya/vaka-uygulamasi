<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli - Medicom AI</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px; 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        h2, h3 { color: #1a2a6c; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .login-box { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px 20px; background: #1a2a6c; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; width: 100%; }
        button:hover { background: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; font-size: 13px; }
        th { background-color: #1a2a6c; color: white; font-size: 13px; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #e9ecef; }
        .error { color: #dc3545; font-size: 14px; text-align: center; display: block; margin-top: 10px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-logout { background: #dc3545; width: auto; }
        .btn-logout:hover { background: #c82333; }
        .btn-csv { background: #28a745; width: auto; }
        .btn-csv:hover { background: #218838; }
        .btn-back { background: #6c757d; width: auto; text-decoration: none; display: inline-block; padding: 12px 20px; color: white; border-radius: 6px; font-size: 16px; }
        .btn-back:hover { background: #545b62; }
        .case-badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 700; white-space: nowrap; }
        .badge-ahus-ped   { background: #e8f0fe; color: #1a2a6c; }
        .badge-ahus-adult { background: #ede8fe; color: #4a1a6c; }
        .badge-pnh-adult  { background: #fde8e8; color: #8a1515; }
        .badge-unknown    { background: #f0f0f0; color: #666; }
    </style>
</head>
<body>
    <div class="login-box" id="loginScreen">
        <h3 style="text-align:center;">Admin Girişi</h3>
        <input type="email" id="email" placeholder="E-posta Adresi">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="adminLogin()">Giriş Yap</button>
        <span class="error" id="errorMsg"></span>
    </div>

    <div class="container" id="dataScreen" style="display:none;">
        <div class="header-actions">
            <h2>📊 Vaka Kayıtları</h2>
            <div class="btn-group">
                <a href="index.html" class="btn-back">← Vakaya Dön</a>
                <button class="btn-csv" style="width:auto;" onclick="downloadCSV()">📥 CSV İndir</button>
                <button class="btn-logout" style="width:auto;" onclick="logout()">Çıkış Yap</button>
            </div>
        </div>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Tarih</th>
                    <th>Vaka</th>
                    <th>Kullanıcı ID</th>
                    <th>İzlenen Yol</th>
                    <th>Sonuç</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "%%FIREBASE_API_KEY%%",
            authDomain: "%%FIREBASE_AUTH_DOMAIN%%",
            projectId: "%%FIREBASE_PROJECT_ID%%",
            storageBucket: "%%FIREBASE_STORAGE_BUCKET%%",
            messagingSenderId: "%%FIREBASE_MESSAGING_SENDER_ID%%",
            appId: "%%FIREBASE_APP_ID%%"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // caseId → okunabilir etiket
        const CASE_LABELS = {
            'ahus-ped':   'Pediatrik aHÜS',
            'ahus-adult': 'Erişkin aHÜS',
            'pnh-adult':  'Erişkin PNH'
        };

        // Outcome string'ine göre renk
        function outcomeColor(outcome) {
            if (!outcome) return '#dc3545';
            const o = outcome.toLowerCase();
            if (o.includes('tam iyileşme') || o.includes('başarılı') || o.includes('hemoliz kontrolü')) return '#28a745';
            if (o.includes('kby') || o.includes('kronik') || o.includes('parsiyel') || o.includes('progresyon')) return '#fd7e14';
            return '#dc3545';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dataScreen').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('dataScreen').style.display = 'none';
            }
        });

        window.adminLogin = async () => {
            const email = document.getElementById('email').value;
            const pass  = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                document.getElementById('errorMsg').innerText = "Hata: " + error.message;
            }
        };

        window.logout = () => signOut(auth);

        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Veriler Yükleniyor...</td></tr>';
            try {
                const q = query(collection(db, "vaka_kayitlari"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                tbody.innerHTML = '';
                if (snap.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Henüz veri yok.</td></tr>';
                    return;
                }
                snap.forEach((doc) => {
                    const data  = doc.data();
                    const date  = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString('tr-TR') : 'Belirsiz';
                    const caseId    = data.caseId || '';
                    const caseLabel = CASE_LABELS[caseId] || (caseId || 'Bilinmiyor');
                    const badgeClass = caseId ? 'badge-' + caseId : 'badge-unknown';
                    const color  = outcomeColor(data.outcome);
                    const path   = Array.isArray(data.path) ? data.path.join(' ➝ ') : (data.path || '');
                    tbody.innerHTML += `<tr>
                        <td>${date}</td>
                        <td><span class="case-badge ${badgeClass}">${caseLabel}</span></td>
                        <td style="font-size:12px; color:#777;">${data.id || ''}</td>
                        <td style="font-size:12px; color:#555;">${path}</td>
                        <td style="font-weight:600; color:${color};">${data.outcome || ''}</td>
                    </tr>`;
                });
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Yetki Hatası veya Bağlantı Sorunu.</td></tr>';
            }
        }

        window.downloadCSV = () => {
            let csv = '\uFEFF' + "Tarih,Vaka,ID,Yol,Sonuc\n";
            const rows = document.querySelectorAll("#dataTable tbody tr");
            rows.forEach(row => {
                const cols = row.querySelectorAll("td");
                if (cols.length > 1) {
                    // col 1 (Vaka) içindeki badge span'ının text'ini al
                    const vakaTxt = cols[1].querySelector('.case-badge')
                        ? cols[1].querySelector('.case-badge').innerText
                        : cols[1].innerText;
                    csv += `${cols[0].innerText},"${vakaTxt}",${cols[2].innerText},"${cols[3].innerText}","${cols[4].innerText}"\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "vaka_analizi.csv";
            link.click();
        };
    </script>
</body>
</html>
